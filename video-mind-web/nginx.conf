server {
    listen 80;
    server_name localhost;

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 代理 /agent/xxx 到 Java 后端（保留 /agent 前缀）
    location /agent/ {
        proxy_pass http://video-mind-java:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理 /user/xxx 到 Java 后端（保留 /user 前缀）
    location /user/ {
        proxy_pass http://video-mind-java:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}